<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" fill="none">
  <!-- Background Glow -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4E4B7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8941F;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Chart Line Icon (Left) -->
  <g filter="url(#glow)">
    <path d="M10,45 L20,35 L30,40 L40,25 L50,30 L60,20" 
          stroke="url(#goldGradient)" 
          stroke-width="3" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          fill="none"/>
    <circle cx="20" cy="35" r="3" fill="#D4AF37"/>
    <circle cx="40" cy="25" r="3" fill="#D4AF37"/>
    <circle cx="60" cy="20" r="3" fill="#D4AF37"/>
    
    <!-- Trend Break Indicator -->
    <path d="M45,30 L50,20 L55,25" 
          stroke="#F4E4B7" 
          stroke-width="2.5" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          fill="none"
          opacity="0.8"/>
  </g>
  
  <!-- TQP Text -->
  <g filter="url(#shadow)">
    <text x="75" y="50" 
          font-family="'Playfair Display', serif" 
          font-size="42" 
          font-weight="900" 
          fill="url(#goldGradient)" 
          letter-spacing="2">
      TQP
    </text>
  </g>
  
  <!-- Subtitle -->
  <text x="75" y="65" 
        font-family="'Montserrat', sans-serif" 
        font-size="9" 
        font-weight="600" 
        fill="#B0B0B0" 
        letter-spacing="1.5">
    TENDÊNCIAS QUEBRAM PADRÕES
  </text>
  
  <!-- Decorative Elements -->
  <rect x="75" y="30" width="35" height="2" fill="url(#goldGradient)" opacity="0.6"/>
  <circle cx="112" cy="31" r="1.5" fill="#D4AF37"/>
  
  <!-- Chart Pattern (Right) -->
  <g opacity="0.4" transform="translate(200, 20)">
    <path d="M0,30 L10,25 L20,28 L30,20 L40,24 L50,18" 
          stroke="#D4AF37" 
          stroke-width="1.5" 
          stroke-dasharray="3,3"
          fill="none"/>
  </g>
</svg>